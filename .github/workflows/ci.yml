name: CI

on:
  push:
  pull_request:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.event_name != 'schedule'
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run non-live suite
        run: SAFE_AGENTIC_SKIP_LIVE=1 bash tests/run-all.sh

  shellcheck:
    if: github.event_name != 'schedule'
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell entrypoints
        run: |
          shellcheck \
            bin/agent \
            bin/agent-alias \
            bin/agent-lib.sh \
            bin/agent-claude \
            bin/agent-codex \
            bin/repo-url.sh \
            entrypoint.sh \
            vm/setup.sh

  docker-build-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build --tag safe-agentic:ci .

      - name: Smoke built image
        run: |
          docker run --rm --entrypoint bash safe-agentic:ci -lc '
            id | grep -q "uid=1000(agent) gid=1000(agent)"
            id | grep -q "groups=1000(agent)"
            command -v claude codex aws helm jq rg gh terraform docker pnpm bun >/dev/null
            git --version >/dev/null
            ! command -v sudo >/dev/null 2>&1
            test -f /home/agent/.ssh.baked/known_hosts
            test -f /home/agent/.ssh.baked/config
          '

      - name: Smoke entrypoint shell path
        run: |
          docker run --rm \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /var/tmp:rw,noexec,nosuid,size=32m \
            --tmpfs /run:rw,noexec,nosuid,size=8m \
            --tmpfs /home/agent/.config:rw,noexec,nosuid,uid=1000,gid=1000,size=8m \
            --tmpfs /home/agent/.ssh:rw,noexec,nosuid,uid=1000,gid=1000,size=1m \
            safe-agentic:ci -lc '
              git config --global user.name | grep -x Agent >/dev/null
              git config --global user.email | grep -x agent@localhost >/dev/null
              test -f /home/agent/.config/git/config
              test -f /home/agent/.ssh/known_hosts
              test -f /home/agent/.ssh/config
              pwd | grep -x /workspace >/dev/null
            '

      - name: Smoke Claude entrypoint
        run: |
          output="$(
            docker run --rm \
              --read-only \
              --tmpfs /tmp:rw,noexec,nosuid,size=64m \
              --tmpfs /var/tmp:rw,noexec,nosuid,size=32m \
              --tmpfs /run:rw,noexec,nosuid,size=8m \
              --tmpfs /home/agent/.config:rw,noexec,nosuid,uid=1000,gid=1000,size=8m \
              --tmpfs /home/agent/.ssh:rw,noexec,nosuid,uid=1000,gid=1000,size=1m \
              --tmpfs /home/agent/.claude:rw,noexec,nosuid,uid=1000,gid=1000,size=8m \
              -e AGENT_TYPE=claude \
              safe-agentic:ci --help 2>&1
          )"
          printf '%s\n' "$output"
          grep -F "Usage: claude" <<<"$output"
