name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: code-review-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed-files
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base_sha" "$head_sha" -- ':!vendor/**')
          printf 'files<<EOF\n%s\nEOF\n' "$changed" >> "$GITHUB_OUTPUT"

      - name: Fetch existing review comments
        id: existing-comments
        run: |
          comments=$(gh api /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | {path: .path, line: .line, body: .body}]')
          printf 'comments<<EOF\n%s\nEOF\n' "$comments" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        if: steps.changed-files.outputs.files != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          track_progress: true
          show_full_output: true
          prompt: |
            Review this PR against CLAUDE.md standards.

            GitHub Context:
            - Repository: ${{ github.repository }}
            - PR Number: ${{ github.event.pull_request.number }}
            - Commit SHA: ${{ github.event.pull_request.head.sha }}

            Changed files: ${{ steps.changed-files.outputs.files }}

            Existing inline comments on this PR (do NOT duplicate these):
            ${{ steps.existing-comments.outputs.comments }}

            After reviewing, for each issue found, post an inline comment on the PR using `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            IMPORTANT: Before posting, check if a similar comment already exists at the same file and line. Skip posting if an existing comment already covers the same issue.

            Inline comment payload requirements:
            - `owner`: `${{ github.repository_owner }}`
            - `repo`: `${{ github.event.repository.name }}`
            - `pullNumber`: `${{ github.event.pull_request.number }}`
            - `path`: changed file path
            - `line`: exact review line on the RIGHT side
            - `body`: use the format below
            - `confirmed`: `true`

            Severity levels: CRITICAL, HIGH, MEDIUM, LOW

            Do not ask for approval or confirmation before posting comments. The workflow already grants the required GitHub token and allowed tools.
            If you have no additional actionable inline comments, exit immediately.
            Do NOT post any summary comment. Only inline comments on specific lines.
          claude_args: >-
            --max-turns 120
            --allowedTools
            mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(grep:*),Bash(rg:*),Bash(sed:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(nl:*),Bash(jq:*),Bash(find:*),Bash(fd:*)
