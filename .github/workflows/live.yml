name: Live OrbStack

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: live-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  live-orbstack:
    name: Live OrbStack Smoke
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-all

      - name: Verify runner prerequisites
        run: |
          command -v orb

      - name: Set up VM and image
        run: ./bin/safe-ag setup

      - name: Diagnose environment
        run: ./bin/safe-ag diagnose

      - name: Dry-run spawn smoke
        run: ./bin/safe-ag spawn claude --dry-run --repo https://github.com/octocat/Hello-World

      - name: Dry-run nested pipeline smoke
        run: ./bin/safe-ag pipeline examples/pipeline-display-nested.yaml --dry-run

      - name: Cleanup containers and auth
        if: always()
        run: ./bin/safe-ag cleanup --auth
