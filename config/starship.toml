format = """$env_var$directory$git_branch$git_status$character"""

[env_var.AGENT_TYPE]
variable = "AGENT_TYPE"
format = "[$env_value](bold cyan) "
default = "shell"

[directory]
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
format = "[$branch](bold purple) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
