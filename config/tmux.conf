# safe-agentic tmux config
# Baked into the Docker image at /home/agent/.tmux.conf

# Enable mouse — scroll wheel enters copy mode automatically
set -g mouse on

# Large scroll buffer (matches TMUX_HISTORY_LIMIT from entrypoint)
set -g history-limit 500000

# Vi mode keys for copy mode navigation
setw -g mode-keys vi

# Don't exit copy mode on mouse drag end (so you can see what you selected)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy to terminal clipboard on selection (works with iTerm2/Terminal.app)
# Enter copy mode: Ctrl-b [
# Select text: v (start), y (yank/copy)
# Or: mouse drag to select, then y to copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "cat"

# Tip: Hold Option (⌥) while selecting to bypass tmux and use terminal native copy
