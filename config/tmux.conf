# safe-agentic tmux config
# Baked into the Docker image at /home/agent/.tmux.conf

# Resize to the latest active client. The desktop app also drives
# resize-window explicitly on attach/resize (SIGWINCH may not survive the
# container-machine relay), which agrees with latest since the app is the
# only client. Manual mode was tried and kills detached sessions (0x0 window),
# so latest is the stable default.
set -g window-size latest
setw -g aggressive-resize on

# Redraw stability inside the desktop app's xterm.js:
# - zero escape-time so TUI escape sequences (Claude Code) aren't mis-timed
#   into stale/garbled frames
# - advertise xterm-256color (what xterm.js emulates) instead of the default
#   screen terminfo, and enable truecolor + focus events
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse — scroll wheel enters copy mode automatically
set -g mouse on

# Large scroll buffer (matches TMUX_HISTORY_LIMIT from entrypoint)
set -g history-limit 500000

# Vi mode keys for copy mode navigation
setw -g mode-keys vi

# Don't exit copy mode on mouse drag end (so you can see what you selected)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy to terminal clipboard on selection (works with iTerm2/Terminal.app)
# Enter copy mode: Ctrl-b [
# Select text: v (start), y (yank/copy)
# Or: mouse drag to select, then y to copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "cat"

# Tip: Hold Option (⌥) while selecting to bypass tmux and use terminal native copy
