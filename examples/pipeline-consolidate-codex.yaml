# Pipeline: consolidate review findings → fix → PR
#
# Run AFTER fleet-review-and-fix.yaml agents have finished.
# The fleet agents push their findings to review/* branches.
# This pipeline fetches those branches, consolidates, fixes, and creates a PR.
#
# Usage:
#   safe-ag pipeline examples/pipeline-consolidate-codex.yaml

name: consolidate-and-fix-codex
steps:
  - name: consolidate-fix-pr
    type: claude
    repo: git@github.com:0x666c6f/safe-agentic.git
    ssh: true
    reuse_auth: true
    auto_trust: true
    prompt: "You must do ALL of the following steps in order. Do not stop until you have created the PR and cleaned up branches. Step 1: Fetch review branches with git fetch origin and look for branches starting with review/. Step 2: For each review branch found, extract the REVIEW-*.md file using git show origin/BRANCH:FILENAME > /tmp/filename. Step 3: Read all extracted review files from /tmp/. Create a consolidated list of findings sorted by severity (critical first). Use the consolidated list as your working reference only — do NOT commit it to the repo. Step 4: Create a new branch: git checkout -b fix/consolidated-review. Step 5: Fix ALL critical and high severity actionable findings. For each fix, commit separately with a descriptive message. Do NOT include any REVIEW-*.md files in your commits. Step 6: Run the full test suite: bash tests/run-all.sh. If any tests fail, fix them and commit. Step 7: Push: git push origin fix/consolidated-review. Step 8: Wait 30 seconds then check CI status: gh run list --branch fix/consolidated-review --limit 1. If CI fails, read the logs with gh run view --log-failed, fix the issues, commit, push, and check again. Repeat until CI passes. Step 9: Create the PR: gh pr create --title 'fix: address critical/high findings from review fleet' --base main --body 'Fixes critical and high severity findings from parallel code review, security audit, test coverage, and docs review agents.' Step 10: Clean up review branches: git push origin --delete review/code-quality review/security-audit review/test-coverage review/docs-audit. Ignore errors for branches that dont exist. Step 11: Print the PR URL."
