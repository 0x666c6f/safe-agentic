# Pipeline: Claude review + Codex review -> final reconciliation
#
# Based on fleet-self-review.yaml, but runs a matched review prompt through both
# models and then reconciles their findings into one report.
#
# Usage:
#   safe-ag pipeline examples/pipeline-double-review-reconcile.yaml

name: double-review-reconcile
defaults:
  repo: git@github.com:0x666c6f/safe-agentic.git
  ssh: true
  reuse_auth: true
  auto_trust: true

stages:
  - name: self-review
    models: [claude, codex]
    agents:
      - name: reviewer
        prompt: "Perform a thorough self-review of the safe-agentic repository using the same intent as examples/fleet-self-review.yaml. Focus on code quality, error handling, edge cases, bash quoting, docs-to-code drift, isolation guarantees, and missing tests. Write findings to REVIEW-${model}.md at the repo root with severity labels (critical/high/medium/low). Then create a branch named review/self-${model}, commit only that review file, and push it to origin."

  - name: reconcile
    depends_on:
      - self-review
    agents:
      - name: reconcilor
        type: claude
        prompt: "You must do ALL of the following steps in order. Step 1: git fetch origin review/self-claude review/self-codex. Step 2: extract the two reports with git show origin/review/self-claude:REVIEW-claude.md > /tmp/REVIEW-claude.md and git show origin/review/self-codex:REVIEW-codex.md > /tmp/REVIEW-codex.md. Step 3: read both files and produce a reconciled report that groups findings into: shared findings, Claude-only findings, Codex-only findings, and conflicts/uncertainties. Step 4: write that report to REVIEW-RECONCILED.md at the repo root. Step 5: create a branch named review/self-reconciled, commit only REVIEW-RECONCILED.md, and push it to origin. Step 6: delete the investigation branches with git push origin --delete review/self-claude review/self-codex. Ignore errors if a branch is already gone. Step 7: print a short summary of the shared critical/high findings and the branch name."
