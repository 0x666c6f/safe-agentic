site_name: safe-agentic
site_description: Run AI coding agents inside a hardened VM and per-agent containers
site_url: https://0x666c6f.github.io/safe-agentic/
repo_url: https://github.com/0x666c6f/safe-agentic
repo_name: 0x666c6f/safe-agentic

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Command Map: usage.md
  - Guides:
    - Spawning Agents: guide/spawning.md
    - Managing Agents: guide/managing.md
    - Workflow: guide/workflow.md
    - Fleet and Pipelines: guide/fleet.md
    - Terminal UI: guide/tui.md
    - Analytics: guide/analytics.md
    - Configuration: guide/configuration.md
  - Reference:
    - Architecture: architecture.md
    - Security: security.md
    - Isolation Boundaries: architecture/isolation.md
    - Networking: architecture/networking.md
    - Container Internals: architecture/container.md
    - Security Defaults: security/defaults.md
    - Threat Surface: security/threat-surface.md
    - Supply Chain: security/supply-chain.md
    - Threat Model: security/threat-model.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/0x666c6f/safe-agentic
