site_name: safe-agentic
site_description: Isolated environment for running AI coding agents safely
site_url: https://morpho-labs.github.io/safe-agentic/
repo_url: https://github.com/morpho-labs/safe-agentic
repo_name: morpho-labs/safe-agentic

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Guide:
    - Spawning Agents: guide/spawning.md
    - Managing Agents: guide/managing.md
    - Developer Workflow: guide/workflow.md
    - Fleet & Orchestration: guide/fleet.md
    - Analytics: guide/analytics.md
    - Configuration: guide/configuration.md
  - Architecture: architecture.md
  - Security: security.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/morpho-labs/safe-agentic
