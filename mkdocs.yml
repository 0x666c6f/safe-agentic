site_name: berth
site_description: Run AI coding agents inside a hardened VM with one isolated container per agent
site_url: https://0x666c6f.github.io/berth/
repo_url: https://github.com/0x666c6f/berth
repo_name: 0x666c6f/berth

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/brand/berth-mark-dark.svg
  favicon: assets/brand/favicon.ico
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Introduction:
    - Installation: install.md
    - Quickstart: quickstart.md
  - Guides:
    - Spawning Agents: guide/spawning.md
    - Monitor & Manage: guide/managing.md
    - Review & Ship: guide/workflow.md
    - Worktrees: guide/worktrees.md
    - Fleets & Pipelines: guide/fleet.md
    - Automation: guide/automation.md
    - Configuration: guide/configuration.md
  - Interfaces:
    - Desktop App: guide/app.md
    - Terminal UI: guide/tui.md
  - Reference:
    - CLI: reference/cli.md
    - TUI: reference/tui.md
    - Manifests: reference/manifests.md
  - Concepts:
    - Architecture: architecture.md
    - Security: security.md

not_in_nav: |
  roadmap/
  superpowers/

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/0x666c6f/berth
