stages:
  - name: claude-review
    pipeline: review-pipeline-claude.yaml

  - name: codex-review
    pipeline: review-pipeline-codex.yaml

  - name: reconcile
    depends_on: [claude-review, codex-review]
    agents:
      - name: reconciler
        type: claude
        repo: git@github.com:0x666c6f/safe-agentic.git
        ssh: true
        reuse_auth: true
        auto_trust: true
        memory: 16g
        cpus: "8"
        prompt: |
          git checkout feature/pla-1192-rewrite-safe-agentic-cli-from-bash-to-go-phase-1-foundation && git pull

          Read ALL review reports in fleet/:
            Claude reviews: claude-review-code.md, claude-review-tests.md, claude-review-security.md
            Codex reviews: codex-review-code.md, codex-review-tests.md, codex-review-security.md

          Create fleet/REVIEW-SUMMARY.md that:
          1. Cross-references findings from both Claude and Codex
          2. Highlights findings that BOTH reviewers flagged (high confidence)
          3. Notes findings only one reviewer caught (needs verification)
          4. Ranks all findings by severity: Critical > High > Medium > Low

          Fix all Critical and Important issues directly in the code. Run go test ./... after each fix.

          After all fixes, delete individual review files:
          git rm fleet/claude-review-*.md fleet/codex-review-*.md
          git add -A && git commit -m "fix: address review findings from dual Claude+Codex review" && git push
